<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Sign In — DaraQuiz AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Inter',sans-serif;}
body{background:#0d1117;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(99,102,241,.18) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(139,92,246,.15) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 50% 50%,rgba(79,70,229,.08) 0%,transparent 70%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;width:100%;max-width:400px;}
.brand{text-align:center;margin-bottom:36px;}
.brand-icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 0 0 1px rgba(99,102,241,.4),0 12px 40px rgba(99,102,241,.35);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 1px rgba(99,102,241,.4),0 12px 40px rgba(99,102,241,.35)}50%{box-shadow:0 0 0 1px rgba(99,102,241,.6),0 12px 48px rgba(99,102,241,.5)}}
.brand-name{font-size:1.5rem;font-weight:800;color:#f1f5f9;letter-spacing:-.02em;margin-bottom:4px;}
.brand-sub{font-size:.875rem;color:#64748b;font-weight:500;}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:32px 28px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 24px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);}
@media(max-width:440px){.card{padding:24px 20px;border-radius:18px;}}
.card-title{font-size:1.1rem;font-weight:700;color:#e2e8f0;margin-bottom:6px;}
.card-sub{font-size:.82rem;color:#64748b;margin-bottom:24px;line-height:1.5;}
.alert{display:none;padding:11px 14px;border-radius:10px;font-size:.83rem;font-weight:500;margin-bottom:16px;line-height:1.5;}
.alert.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.alert.success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;}
.alert.info{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;}
.alert.show{display:block;}
.field{margin-bottom:16px;}
.field-label{display:block;font-size:.75rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;}
.field-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;color:#e2e8f0;font-size:1rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s,background .15s;}
.field-input:focus{border-color:rgba(99,102,241,.65);background:rgba(99,102,241,.07);}
.field-input::placeholder{color:#475569;}
.pw-wrap{position:relative;}
.pw-wrap .field-input{padding-right:44px;}
.pw-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#475569;padding:4px;display:flex;align-items:center;transition:color .15s;}
.pw-toggle:hover{color:#94a3b8;}
.submit-btn{width:100%;padding:14px 20px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:transform .1s,box-shadow .15s,opacity .15s;box-shadow:0 4px 20px rgba(99,102,241,.4);display:flex;align-items:center;justify-content:center;gap:8px;}
.submit-btn:hover{box-shadow:0 6px 28px rgba(99,102,241,.55);transform:translateY(-1px);}
.submit-btn:active{transform:translateY(0);}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.step-done{display:none;text-align:center;padding:12px 0;}
.done-icon{font-size:2.8rem;margin-bottom:12px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.done-title{font-size:1.1rem;font-weight:700;color:#e2e8f0;margin-bottom:6px;}
.done-sub{font-size:.85rem;color:#94a3b8;line-height:1.5;}
.bottom-note{text-align:center;font-size:.76rem;color:#334155;margin-top:20px;line-height:1.5;}
.link-row{text-align:center;margin-top:14px;font-size:.8rem;color:#475569;}
.link-row a{color:#6366f1;text-decoration:none;font-weight:600;}
.link-row a:hover{color:#818cf8;}
</style>
<script>
window.AQS={ajax_url:'firebase',nonce:'',home_url:'index.html',create_page_url:'create-quiz.html',studio_url:'studio.html',dashboard_url:'dashboard.html',register_url:'register.html',is_logged_in:false,is_host:false,is_admin:false,groq_key:'',plugin_url:'./'};
</script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script type="module" src="js/aqs-firebase.js"></script>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
        <polygon points="18,2 34,10 34,26 18,34 2,26 2,10" fill="white" opacity="0.9"/>
        <circle cx="18" cy="18" r="6" fill="#6366f1"/>
      </svg>
    </div>
    <div class="brand-name">DaraQuiz AI</div>
    <div class="brand-sub">Powered by Darapet Technology</div>
  </div>

  <div class="card">
    <div id="aqs-login-alert" class="alert"></div>

    <div id="step-login">
      <div class="card-title">Welcome back!</div>
      <div class="card-sub">Sign in with your email and password to continue.</div>

      <form id="aqs-login-form" autocomplete="off" novalidate>
        <div class="field">
          <label class="field-label" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="field-input" placeholder="you@example.com"
                 autocomplete="email" inputmode="email" required />
        </div>
        <div class="field">
          <label class="field-label" for="login-password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="login-password" class="field-input"
                   placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="pw-toggle" id="pw-toggle-btn" aria-label="Toggle password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="submit-btn" id="aqs-login-submit">
          <span id="login-btn-label">Sign In</span>
          <span class="spinner" id="login-spinner"></span>
        </button>
      </form>

      <div class="link-row" style="margin-top:16px;">
        <a href="register.html">Don't have an account? Register free</a>
      </div>
    </div>

    <div id="step-done" class="step-done">
      <div class="done-icon">✅</div>
      <div class="done-title" id="done-title">You're in!</div>
      <div class="done-sub" id="done-sub">Taking you to your dashboard…</div>
    </div>
  </div>

  <div class="bottom-note">By continuing you agree to our terms of service.</div>
</div>

<script>
(function () {
  'use strict';

  document.getElementById('pw-toggle-btn').addEventListener('click', function () {
    var input = document.getElementById('login-password');
    input.type = input.type === 'password' ? 'text' : 'password';
  });

  function showAlert(msg, type) {
    var el = document.getElementById('aqs-login-alert');
    el.textContent = msg; el.className = 'alert show ' + (type || 'error');
  }
  function hideAlert() { document.getElementById('aqs-login-alert').className = 'alert'; }
  function setLoading(on) {
    document.getElementById('aqs-login-submit').disabled = on;
    document.getElementById('login-btn-label').style.display = on ? 'none' : '';
    document.getElementById('login-spinner').style.display   = on ? 'inline-block' : 'none';
  }

  /* Show reason message if redirected here */
  (function () {
    var params = new URLSearchParams(window.location.search);
    if (params.get('reason') === 'timeout') {
      showAlert('You were signed out after inactivity. Please sign in again.', 'info');
    }
    if (params.get('reason') === 'auth') {
      showAlert('Please sign in to access that page.', 'info');
    }
    /* Pre-fill email if remembered */
    try {
      var saved = localStorage.getItem('aqs_last_email');
      if (saved) document.getElementById('login-email').value = saved;
    } catch (_) {}
  })();

  document.getElementById('aqs-login-form').addEventListener('submit', function (e) {
    e.preventDefault(); hideAlert();

    var email    = (document.getElementById('login-email').value    || '').trim().toLowerCase();
    var password = (document.getElementById('login-password').value || '');

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showAlert('Please enter a valid email address.', 'error'); return;
    }
    if (!password) { showAlert('Please enter your password.', 'error'); return; }

    setLoading(true);
    window._aqsIsLoggingIn = true;

    function doLogin() {
      if (typeof window.aqsAjax !== 'function') { setTimeout(doLogin, 250); return; }
      window.aqsAjax(
        { action: 'aqs_login', username: email, password: password },
        function (res) {
          if (res && res.success && res.data && res.data.redirect) {
            try { localStorage.setItem('aqs_last_email', email); } catch (_) {}
            document.getElementById('step-login').style.display = 'none';
            document.getElementById('step-done').style.display  = '';
            var name = (res.data && res.data.user_name) || email.split('@')[0];
            document.getElementById('done-title').textContent = 'Welcome, ' + name + '!';
            document.getElementById('done-sub').textContent   = 'Taking you to your dashboard…';
            setTimeout(function () {
              window._aqsIsLoggingIn = false;
              window.location.replace(res.data.redirect);
            }, 900);
          } else {
            window._aqsIsLoggingIn = false;
            var msg = (res && res.data)
              ? (typeof res.data === 'string' ? res.data : (res.data.message || 'Incorrect email or password.'))
              : 'Incorrect email or password. Please try again.';
            showAlert(msg, 'error'); setLoading(false);
          }
        },
        function (err) {
          window._aqsIsLoggingIn = false;
          var errMsg = (err && err.message) || 'Sign-in failed. Check your email and password.';
          showAlert(errMsg, 'error'); setLoading(false);
        }
      );
    }

    doLogin();
  });
})();
</script>
<script src="js/aqs-notifs-bar.js"></script>
<script src="js/aqs-session.js"></script>
<script src="capacitor-bridge.js"></script>
</body>
</html>
