<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create Account — xzily AI</title>
<link rel="stylesheet" href="css/aqs-style.css">
<link rel="stylesheet" href="css/aqs-auth.css">
<style>
body{margin:0;padding:0;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;font-family:'Inter',sans-serif;}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
window.AQS = {
    ajax_url: 'firebase',
    nonce: '',
    auth_nonce: '',
    home_url: 'index.html',
    login_url: 'login.html',
    dashboard_url: 'dashboard.html',
    is_logged_in: false,
    is_host: false,
    is_admin: false,
    groq_key: '',
    plugin_url: './'
};
</script>

<!-- Firebase SDK -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script type="module" src="js/aqs-firebase.js"></script>
</head>
<body>
<div class="aqs-auth-page">
<div class="aqs-auth-card">

    <div class="aqs-auth-brand">
        <div class="aqs-auth-logo-icon">
            <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
                <polygon points="18,2 34,10 34,26 18,34 2,26 2,10" fill="white" opacity="0.9"/>
                <circle cx="18" cy="18" r="6" fill="#6366f1"/>
            </svg>
        </div>
        <h1 class="aqs-auth-title">Create your account</h1>
        <p class="aqs-auth-subtitle">Join xzily AI — free forever</p>
    </div>

    <div id="aqs-register-alert" class="aqs-auth-alert"></div>

    <!-- Social signup -->
    <div class="aqs-social-btns">
        <button type="button" class="aqs-social-btn aqs-social-google" id="aqs-google-login">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
            Sign up with Google
        </button>
    </div>

    <div class="aqs-auth-divider"><span>or create account with email</span></div>

    <form id="aqs-register-form" autocomplete="off" novalidate>
        <div class="aqs-auth-row-2">
            <div class="aqs-auth-field">
                <label for="reg-name">Full Name</label>
                <input type="text" id="reg-name" placeholder="John Doe" required autocomplete="name" />
            </div>
            <div class="aqs-auth-field">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" placeholder="johndoe" required autocomplete="username" />
            </div>
        </div>
        <div class="aqs-auth-field">
            <label for="reg-email">Email Address</label>
            <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="aqs-auth-field">
            <label>I am a…</label>
            <div class="aqs-role-chips" id="aqs-role-chips">
                <button type="button" class="aqs-role-chip" data-role="student">🎓 Student</button>
                <button type="button" class="aqs-role-chip" data-role="teacher">📚 Teacher</button>
                <button type="button" class="aqs-role-chip" data-role="lecturer">🏫 Lecturer</button>
                <button type="button" class="aqs-role-chip" data-role="host">🎯 Host</button>
                <button type="button" class="aqs-role-chip" data-role="other">✦ Other</button>
            </div>
            <input type="hidden" id="reg-role" value="" />
        </div>
        <div class="aqs-auth-row-2">
            <div class="aqs-auth-field">
                <label for="reg-password">Password</label>
                <div class="aqs-pw-wrap">
                    <input type="password" id="reg-password" placeholder="Min. 6 characters" required autocomplete="new-password" />
                    <button type="button" class="aqs-pw-toggle" data-target="reg-password" aria-label="Toggle">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <div class="aqs-pw-strength"><div class="aqs-pw-strength-bar" id="reg-pw-strength-bar"></div></div>
            </div>
            <div class="aqs-auth-field">
                <label for="reg-confirm">Confirm Password</label>
                <div class="aqs-pw-wrap">
                    <input type="password" id="reg-confirm" placeholder="Repeat password" required autocomplete="new-password" />
                    <button type="button" class="aqs-pw-toggle" data-target="reg-confirm" aria-label="Toggle">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
        </div>
        <label class="aqs-auth-check">
            <input type="checkbox" id="reg-terms" />
            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
        </label>
        <button type="submit" class="aqs-auth-submit" id="aqs-register-submit">Create Account</button>
    </form>

    <p class="aqs-auth-switch">
        Already have an account? <a href="login.html">Sign in</a>
    </p>

</div>
</div>
<script src="js/aqs-auth.js"></script>
<script src="js/aqs-session.js"></script>
</body>
</html>
