<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#080910">
<title>📖 Reader — xzily Library</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/aqs-library.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
html,body{height:100%;overflow:hidden;}

.mob-rdr-hdr{
  position:fixed;top:0;left:0;right:0;z-index:300;height:52px;
  display:flex;align-items:center;gap:8px;padding:0 14px;
  background:rgba(8,9,16,.97);border-bottom:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(16px);
}
.mob-rdr-title{flex:1;min-width:0;font-size:.8rem;font-weight:700;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mob-rdr-hbtn{
  padding:5px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);
  color:#94a3b8;font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;
  display:inline-flex;align-items:center;gap:3px;transition:all .18s;text-decoration:none;
}
.mob-rdr-hbtn:hover,.mob-rdr-hbtn:active{background:rgba(255,255,255,.1);color:#e2e8f0;}
.mob-rdr-hbtn.ac{border-color:rgba(99,102,241,.35);background:rgba(99,102,241,.08);color:#a5b4fc;}

/* Stage */
.mob-rdr-stage{
  position:fixed;top:52px;bottom:58px;left:0;right:0;
  overflow-y:auto;background:#090a18;
  -webkit-overflow-scrolling:touch;
}
.mob-rdr-prog{position:sticky;top:0;height:3px;background:rgba(255,255,255,.05);z-index:10;}
.mob-rdr-prog-fill{height:100%;background:linear-gradient(90deg,#6366f1,#a78bfa);transition:width .3s;width:0%;}

/* Uploader strip */
.mob-rdr-strip{
  display:flex;align-items:center;gap:12px;padding:10px 16px;
  background:rgba(99,102,241,.07);border-bottom:1px solid rgba(99,102,241,.12);
  cursor:pointer;
}
.mob-rdr-strip:active{background:rgba(99,102,241,.13);}
.mob-rdr-av{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;overflow:hidden;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:800;color:#fff;border:2px solid rgba(99,102,241,.3);}
.mob-rdr-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.mob-rdr-strip-info{flex:1;min-width:0;}
.mob-rdr-strip-name{font-size:.82rem;font-weight:700;color:#e2e8f0;}
.mob-rdr-strip-sub{font-size:.67rem;color:#94a3b8;}

/* Page area */
.mob-rdr-page{max-width:760px;margin:0 auto;padding:24px 16px 60px;}
.mob-rdr-page-tag{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06);}
.mob-rdr-badge{font-size:.65rem;font-weight:700;color:#6366f1;padding:3px 10px;border-radius:20px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);}
.mob-rdr-content{font-family:'Lora',Georgia,serif;font-size:.95rem;line-height:1.9;color:#cbd5e1;word-break:break-word;}
.mob-rdr-content p{margin-bottom:1em;}
.mob-rdr-content h1{font-family:'Inter',sans-serif;font-size:1.2rem;font-weight:800;color:#e2e8f0;margin:1.4em 0 .4em;}
.mob-rdr-content h2{font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;color:#a5b4fc;margin:1.2em 0 .3em;}
.mob-rdr-content strong{color:#e2e8f0;}
.mob-rdr-content em{color:#c4b5fd;}

/* Loading */
.mob-rdr-loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 20px;color:#64748b;font-size:.85rem;}
.mob-rdr-spinner{width:32px;height:32px;border:3px solid rgba(99,102,241,.2);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{100%{transform:rotate(360deg)}}
.mob-canvas-wrap{display:flex;justify-content:center;padding-bottom:20px;}
#mob-canvas{max-width:100%;box-shadow:0 4px 24px rgba(0,0,0,.6);border-radius:2px;display:none;}

/* Footer */
.mob-rdr-footer{
  position:fixed;bottom:0;left:0;right:0;height:58px;z-index:300;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;gap:8px;
  background:rgba(8,9,16,.97);border-top:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(16px);}
.mob-nav-grp{display:flex;align-items:center;gap:6px;}
.mob-pg-btn{
  padding:7px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);
  color:#94a3b8;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.mob-pg-btn:not(:disabled):active{background:rgba(99,102,241,.1);}
.mob-pg-btn:disabled{opacity:.28;cursor:not-allowed;}
.mob-pg-btn.nxt{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.25);color:#a5b4fc;}
.mob-pg-num{font-size:.72rem;font-weight:700;color:#475569;min-width:50px;text-align:center;}
.mob-act-grp{display:flex;align-items:center;gap:5px;}
.mob-act-btn{
  padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);
  color:#94a3b8;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit;
  display:inline-flex;align-items:center;gap:4px;transition:all .15s;}
.mob-like-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:18px;
  border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);
  color:#94a3b8;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.mob-like-btn.liked{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.35);color:#a5b4fc;}
.mob-like-btn.liked svg{fill:#a5b4fc;}
.mob-like-btn svg{transition:fill .2s;}

/* Bottom sheet */
.mob-sheet-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);display:none;}
.mob-sheet-overlay.open{display:block;}
.mob-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:501;
  background:#0d0e1e;border-radius:20px 20px 0 0;border-top:1px solid rgba(255,255,255,.08);
  display:flex;flex-direction:column;
  max-height:90vh;
  animation:sheet-up .22s cubic-bezier(.22,1,.36,1);}
@keyframes sheet-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mob-sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:10px auto 0;}
.mob-sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07);}
.mob-sheet-title{font-size:.95rem;font-weight:800;color:#e2e8f0;}
.mob-sheet-close{width:28px;height:28px;border-radius:7px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#94a3b8;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.mob-sheet-body{flex:1;overflow-y:auto;padding:16px 18px;-webkit-overflow-scrolling:touch;}

/* Panel content */
.mob-panel-btn{
  width:100%;padding:11px;border-radius:10px;border:1px solid rgba(99,102,241,.3);background:rgba(99,102,241,.08);
  color:#a5b4fc;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:10px;transition:all .15s;}
.mob-panel-btn:disabled{opacity:.4;cursor:not-allowed;}
.mob-ai-out{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px;font-size:.82rem;line-height:1.8;color:#cbd5e1;display:none;margin-bottom:10px;}
.mob-mcq-wrap{display:none;}
.mob-mcq-q{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px;margin-bottom:8px;}
.mob-mcq-qt{font-size:.83rem;font-weight:600;color:#e2e8f0;margin-bottom:8px;line-height:1.5;}
.mob-mcq-opts{display:flex;flex-direction:column;gap:5px;}
.mob-mcq-opt{padding:8px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);color:#94a3b8;font-size:.78rem;cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;}
.mob-mcq-opt.correct{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.35);color:#86efac;}
.mob-mcq-opt.wrong{background:rgba(239,68,68,.09);border-color:rgba(239,68,68,.3);color:#fca5a5;}
.mob-score{background:rgba(99,102,241,.09);border:1px solid rgba(99,102,241,.22);border-radius:12px;padding:20px;text-align:center;display:none;margin-top:10px;}
.mob-score-num{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* Comment + reply UI */
.mob-cmnt-inp{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:.82rem;font-family:inherit;outline:none;resize:none;min-height:70px;margin-bottom:7px;transition:border-color .18s;}
.mob-cmnt-inp:focus{border-color:rgba(99,102,241,.4);}
.mob-cmnt-submit{width:100%;padding:9px;border-radius:8px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:14px;}
.mob-ci{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:9px;padding:10px 12px;margin-bottom:7px;}
.mob-ci-hdr{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.mob-ci-av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;}
.mob-ci-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.mob-ci-author{font-size:.68rem;font-weight:700;color:#a5b4fc;}
.mob-ci-time{font-size:.62rem;color:#475569;margin-left:auto;}
.mob-ci-text{font-size:.8rem;color:#cbd5e1;line-height:1.55;margin-bottom:7px;}
.mob-ci-reply-btn{font-size:.67rem;font-weight:700;color:#64748b;background:none;border:none;cursor:pointer;font-family:inherit;padding:0;}
.mob-ci-replies{padding-left:10px;border-left:2px solid rgba(99,102,241,.2);margin-top:6px;}
.mob-reply-item{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.mob-reply-item:last-child{border-bottom:none;}
.mob-reply-meta{display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.mob-reply-author{font-size:.64rem;font-weight:700;color:#64748b;}
.mob-reply-author.host{color:#a5b4fc;}
.mob-host-badge{font-size:.54rem;background:rgba(99,102,241,.16);border:1px solid rgba(99,102,241,.25);color:#a5b4fc;padding:1px 4px;border-radius:3px;font-weight:700;}
.mob-reply-text{font-size:.75rem;color:#94a3b8;line-height:1.45;}
.mob-reply-form{margin-top:7px;display:none;}
.mob-reply-inp{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:6px 9px;color:#e2e8f0;font-size:.75rem;font-family:inherit;outline:none;resize:none;min-height:40px;margin-bottom:4px;transition:border-color .15s;}
.mob-reply-inp:focus{border-color:rgba(99,102,241,.4);}
.mob-reply-submit{padding:4px 10px;border-radius:6px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<!-- HEADER -->
<header class="mob-rdr-hdr">
  <a href="library.html" style="font-size:1rem;text-decoration:none;flex-shrink:0">📚</a>
  <span class="mob-rdr-title" id="rdr-title">Loading…</span>
  <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">
    <button class="mob-rdr-hbtn ac" onclick="openSheet('ai')">✨</button>
    <button class="mob-rdr-hbtn ac" onclick="openSheet('mcq')">🎯 Quiz</button>
    <button class="mob-rdr-hbtn" onclick="goBack()">← Back</button>
  </div>
</header>

<!-- STAGE -->
<div class="mob-rdr-stage" id="rdr-stage">
  <div class="mob-rdr-prog"><div class="mob-rdr-prog-fill" id="rdr-prog"></div></div>

  <!-- Uploader strip -->
  <div class="mob-rdr-strip" id="rdr-strip" style="display:none" onclick="goHostProfile()">
    <div class="mob-rdr-av" id="rdr-av">?</div>
    <div class="mob-rdr-strip-info">
      <div class="mob-rdr-strip-name" id="rdr-up-name">Loading…</div>
      <div class="mob-rdr-strip-sub">View author's profile & more books →</div>
    </div>
  </div>

  <div class="mob-rdr-page" id="rdr-page">
    <!-- Loading -->
    <div class="mob-rdr-loading" id="rdr-loading">
      <div class="mob-rdr-spinner"></div>
      <span>Loading document…</span>
    </div>

    <!-- Page tag -->
    <div class="mob-rdr-page-tag" id="rdr-page-tag" style="display:none">
      <span class="mob-rdr-badge" id="rdr-badge">Page 1 of 1</span>
    </div>

    <!-- Text content -->
    <div class="mob-rdr-content" id="rdr-content" style="display:none"></div>

    <!-- Canvas fallback -->
    <div class="mob-canvas-wrap" id="rdr-canvas-wrap" style="display:none">
      <canvas id="mob-canvas"></canvas>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="mob-rdr-footer">
  <div class="mob-nav-grp">
    <button class="mob-pg-btn" id="rdr-prev" onclick="prevPage()" disabled>◀</button>
    <span class="mob-pg-num" id="rdr-pg-num">— / —</span>
    <button class="mob-pg-btn nxt" id="rdr-next" onclick="nextPage()" disabled>▶</button>
  </div>
  <div class="mob-act-grp">
    <button class="mob-like-btn" id="rdr-like-btn" onclick="toggleLike()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="rdr-like-svg">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span id="rdr-like-count">0</span>
    </button>
    <button class="mob-act-btn" onclick="openSheet('comments')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Feedback
    </button>
    <a id="rdr-dl" class="mob-act-btn" style="display:none">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </a>
  </div>
</footer>

<!-- BOTTOM SHEET -->
<div class="mob-sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="mob-sheet" id="mob-sheet" style="display:none" onclick="event.stopPropagation()">
  <div class="mob-sheet-handle"></div>
  <div class="mob-sheet-hdr">
    <span class="mob-sheet-title" id="sheet-title"></span>
    <button class="mob-sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="mob-sheet-body" id="sheet-body"></div>
</div>

<div class="lib-toast" id="lib-toast"></div>

<script type="module" src="js/aqs-firebase.js"></script>
<script type="module" src="js/aqs-groq-key.js"></script>
<script type="module" src="js/aqs-library.js"></script>
<script type="module">
  let _book=null,_user=null,_pages=[],_cur=1,_total=1;
  let _pdfDoc=null,_uploaderProfile=null;
  let _mcqData=[],_mcqScore=0,_mcqAnswered=0,_explainText='';

  const params=new URLSearchParams(location.search);
  const bookId=params.get('id');
  if(!bookId) window.libToast('No book ID.');

  window.goBack=function(){
    if(_book&&_book.uploaderUid&&_cur>=_total){
      location.href='library-host-profile.html?uid='+_book.uploaderUid;return;
    }
    if(history.length>1) history.back();
    else location.href='library.html';
  };
  window.goHostProfile=function(){
    if(_book&&_book.uploaderUid) location.href='library-host-profile.html?uid='+_book.uploaderUid;
  };

  window.libOnAuth(async function(user){
    _user=user;
    if(bookId&&_book) window.libRecordView(bookId,user?user.uid:null);
    if(_user&&bookId){
      const liked=await window.libHasLiked(bookId,_user.uid);
      if(liked){document.getElementById('rdr-like-btn').classList.add('liked');document.getElementById('rdr-like-svg').setAttribute('fill','#a5b4fc');}
    }
  });

  async function init(){
    if(!bookId) return;
    try{
      _book=await window.libGetBook(bookId);
      if(!_book){window.libToast('Book not found.');return;}
      document.title=_book.title+' — xzily Library';
      document.getElementById('rdr-title').textContent=_book.title;
      document.getElementById('rdr-like-count').textContent=_book.likes||0;
      const dl=document.getElementById('rdr-dl');
      if(_book.fileUrl){dl.href=_book.fileUrl;dl.download=_book.title||'document';dl.style.display='inline-flex';}
      window.libRecordView(bookId);

      /* Uploader strip */
      if(_book.uploaderUid){
        _uploaderProfile=await window.libGetProfile(_book.uploaderUid);
        renderStrip();
      }

      if(_book.parsedUrl){
        await loadParsed(_book.parsedUrl);
      } else if(_book.fileUrl){
        await loadPdfFallback(_book.fileUrl);
      } else {
        showErr('No content available.');
      }
    }catch(e){showErr('Load error: '+e.message);}
  }

  function renderStrip(){
    const strip=document.getElementById('rdr-strip');
    const av=document.getElementById('rdr-av');
    const nm=document.getElementById('rdr-up-name');
    const name=_uploaderProfile?_uploaderProfile.displayName:(_book.uploaderName||'Unknown');
    const photo=_uploaderProfile?_uploaderProfile.photoURL:_book.uploaderPhotoURL;
    nm.textContent=name;
    if(photo)av.innerHTML=`<img src="${photo}" alt="">`;
    else av.textContent=window.libInitials(name);
    strip.style.display='flex';
  }

  async function loadParsed(url){
    try{
      const res=await fetch(url);
      if(!res.ok) throw new Error('fetch failed');
      const data=await res.json();
      _pages=data.pages||[];_total=_pages.length;
      if(!_total) throw new Error('empty');
      showPage(1);
    }catch(e){
      if(_book.fileUrl) await loadPdfFallback(_book.fileUrl);
      else showErr('Could not load content.');
    }
  }

  async function loadPdfFallback(url){
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    var ext=url.split('?')[0].split('.').pop().toLowerCase();
    if(['doc','docx','ppt','pptx','xls','xlsx'].indexOf(ext)!==-1){
      showIframe('https://view.officeapps.live.com/op/embed.aspx?src='+encodeURIComponent(url));return;
    }
    try{
      _pdfDoc=await pdfjsLib.getDocument({url,withCredentials:false}).promise;
      _total=_pdfDoc.numPages;_pages=[];showPage(1);
    }catch(e){
      showIframe('https://docs.google.com/viewer?url='+encodeURIComponent(url)+'&embedded=true');
    }
  }

  function showIframe(src){
    document.getElementById('rdr-loading').style.display='none';
    document.getElementById('rdr-page-tag').style.display='none';
    document.getElementById('rdr-canvas-wrap').innerHTML=`<iframe src="${src}" style="width:100%;min-height:70vh;border:none;background:#1e1e2e;border-radius:10px" allow="fullscreen"></iframe>`;
    document.getElementById('rdr-canvas-wrap').style.display='block';
  }

  async function showPage(n){
    _cur=n;
    document.getElementById('rdr-stage').scrollTop=0;
    document.getElementById('rdr-prog').style.width=Math.round((_cur/_total)*100)+'%';
    document.getElementById('rdr-pg-num').textContent=_cur+' / '+_total;
    document.getElementById('rdr-badge').textContent='Page '+_cur+' of '+_total;
    document.getElementById('rdr-page-tag').style.display='flex';
    document.getElementById('rdr-loading').style.display='none';
    document.getElementById('rdr-prev').disabled=_cur<=1;
    document.getElementById('rdr-next').disabled=_cur>=_total;
    if(_pages.length>0){
      document.getElementById('rdr-canvas-wrap').style.display='none';
      const el=document.getElementById('rdr-content');el.style.display='block';
      const pg=_pages[n-1];el.innerHTML=formatText(pg?pg.text||'':'');
    } else if(_pdfDoc){
      document.getElementById('rdr-content').style.display='none';
      document.getElementById('rdr-canvas-wrap').style.display='flex';
      await renderCanvas(n);
    }
    /* Last page prompt */
    if(_cur===_total&&_book&&_book.uploaderUid){
      const existing=document.getElementById('mob-last-notif');
      if(!existing){
        const d=document.createElement('div');d.id='mob-last-notif';
        d.style.cssText='margin:20px 0;padding:14px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:14px;text-align:center;';
        d.innerHTML='<div style="font-size:.82rem;font-weight:700;color:#a5b4fc;margin-bottom:5px">🎉 You\'ve finished this book!</div><button style="padding:7px 16px;border-radius:18px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;" onclick="goHostProfile()">View Author Profile →</button>';
        document.getElementById('rdr-content').after(d);
      }
    }
  }

  function formatText(raw){
    if(!raw||!raw.trim()) return '<p style="color:#475569;font-style:italic;text-align:center;padding:30px 0">No readable text on this page.</p>';
    const lines=raw.split('\n');const out=[];let inPara=false;
    for(let i=0;i<lines.length;i++){
      const trimmed=lines[i].trim();
      if(!trimmed){if(inPara){out.push('</p>');inPara=false;}continue;}
      const isAllCaps=trimmed===trimmed.toUpperCase()&&/[A-Z]/.test(trimmed);
      const isH1=isAllCaps&&trimmed.length<=80&&i<12;
      const isH2=isAllCaps&&trimmed.length<=80&&!isH1;
      if(isH1){if(inPara){out.push('</p>');inPara=false;}out.push('<h1>'+esc(trimmed)+'</h1>');}
      else if(isH2){if(inPara){out.push('</p>');inPara=false;}out.push('<h2>'+esc(trimmed)+'</h2>');}
      else{if(!inPara){out.push('<p>');inPara=true;}else out.push(' ');out.push(esc(trimmed));}
    }
    if(inPara)out.push('</p>');return out.join('');
  }
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  async function renderCanvas(n){
    const canvas=document.getElementById('mob-canvas');
    const wrap=document.getElementById('rdr-canvas-wrap');
    canvas.style.display='none';
    const page=await _pdfDoc.getPage(n);
    const w=wrap.clientWidth||window.innerWidth-32;
    const unscaled=page.getViewport({scale:1});
    const scale=Math.min(w/unscaled.width,2.5);
    const vp=page.getViewport({scale});
    canvas.width=vp.width;canvas.height=vp.height;
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    canvas.style.display='block';
  }

  function showErr(msg){document.getElementById('rdr-loading').innerHTML='<div style="color:#64748b;font-size:.82rem;text-align:center;padding:30px">'+msg+'</div>';}

  window.prevPage=function(){if(_cur>1)showPage(_cur-1);};
  window.nextPage=function(){if(_cur<_total)showPage(_cur+1);};

  /* ── Like ── */
  window.toggleLike=async function(){
    if(!_user){window.libToast('Sign in to like.');return;}
    const btn=document.getElementById('rdr-like-btn');
    const svg=document.getElementById('rdr-like-svg');
    btn.disabled=true;
    try{
      const liked=await window.libToggleLike(bookId,_user.uid);
      btn.classList.toggle('liked',liked);
      svg.setAttribute('fill',liked?'#a5b4fc':'none');
      svg.setAttribute('stroke',liked?'#a5b4fc':'currentColor');
      const cur=parseInt(document.getElementById('rdr-like-count').textContent)||0;
      document.getElementById('rdr-like-count').textContent=cur+(liked?1:-1);
    }catch(e){window.libToast('Error: '+e.message);}
    btn.disabled=false;
  };

  /* ── Bottom sheet ── */
  window.openSheet=function(panel){
    document.getElementById('sheet-overlay').classList.add('open');
    const mob=document.getElementById('mob-sheet');mob.style.display='flex';
    const body=document.getElementById('sheet-body');
    const title=document.getElementById('sheet-title');
    if(panel==='ai'){
      title.textContent='✨ AI Explain';
      body.innerHTML=`
        <div style="font-size:.78rem;color:#64748b;margin-bottom:12px;line-height:1.6">AI reads this document and breaks down the key concepts.</div>
        <button class="mob-panel-btn" id="p-explain-btn" onclick="doExplain()">✨ Generate Explanation</button>
        <div class="mob-ai-out" id="p-ai-out"></div>
        <div id="p-dl-wrap" style="display:none">
          <button class="mob-panel-btn" onclick="downloadExplanation()" style="background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:#94a3b8">⬇ Download as Text</button>
        </div>`;
    } else if(panel==='mcq'){
      title.textContent='🎯 Practice Quiz';
      body.innerHTML=`
        <div style="font-size:.78rem;color:#64748b;margin-bottom:12px;line-height:1.6">10 MCQs generated from this document.</div>
        <button class="mob-panel-btn" id="p-mcq-btn" onclick="doMCQ()">🎯 Generate Questions</button>
        <div class="mob-mcq-wrap" id="p-mcq-wrap">
          <div id="p-mcq-qs"></div>
          <div class="mob-score" id="p-score">
            <div class="mob-score-num" id="p-score-num">0/10</div>
            <div style="font-size:.8rem;color:#64748b;margin-top:4px">Practice complete!</div>
            <button class="mob-panel-btn" style="margin-top:12px" onclick="resetMCQ()">↺ Try Again</button>
          </div>
        </div>`;
    } else if(panel==='comments'){
      title.textContent='💬 Feedback';
      body.innerHTML=(_user?`
        <div style="margin-bottom:12px">
          <textarea class="mob-cmnt-inp" id="p-cmnt-inp" placeholder="Share your thoughts…" rows="3"></textarea>
          <button class="mob-cmnt-submit" onclick="submitComment()">Post Feedback</button>
        </div>`:
        `<div style="font-size:.78rem;color:#64748b;margin-bottom:12px;padding:9px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid rgba(255,255,255,.06);">
          <a href="login.html" style="color:#a5b4fc;font-weight:700">Sign in</a> to leave feedback
        </div>`)+
        `<div id="p-cmnt-list"><div style="color:#64748b;font-size:.8rem;text-align:center;padding:20px">Loading…</div></div>`;
      loadComments();
    }
  };
  window.closeSheet=function(){
    document.getElementById('sheet-overlay').classList.remove('open');
    document.getElementById('mob-sheet').style.display='none';
  };

  /* ── AI ── */
  window.doExplain=async function(){
    if(!_book?.fileUrl){window.libToast('No file.');return;}
    const btn=document.getElementById('p-explain-btn');
    btn.disabled=true;btn.innerHTML='<span class="lib-spinner"></span> Reading…';
    const out=document.getElementById('p-ai-out');out.style.display='none';document.getElementById('p-dl-wrap').style.display='none';
    try{
      const result=await window.libAiExplain(_book.fileUrl,_book.title);
      _explainText=result;
      out.innerHTML=result.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
      out.style.display='block';document.getElementById('p-dl-wrap').style.display='block';
    }catch(e){window.libToast('AI error: '+e.message);}
    btn.disabled=false;btn.innerHTML='✨ Generate Explanation';
  };
  window.downloadExplanation=function(){
    if(!_explainText)return;
    const blob=new Blob([_explainText],{type:'text/plain'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=(_book?.title||'explanation')+' — AI Explanation.txt';a.click();
  };
  window.doMCQ=async function(){
    if(!_book?.fileUrl){window.libToast('No file.');return;}
    const btn=document.getElementById('p-mcq-btn');
    btn.disabled=true;btn.innerHTML='<span class="lib-spinner"></span> Generating…';
    const wrap=document.getElementById('p-mcq-wrap');wrap.style.display='none';
    document.getElementById('p-score').style.display='none';
    try{
      _mcqData=await window.libAiMCQ(_book.fileUrl,_book.title);
      _mcqAnswered=0;_mcqScore=0;renderMCQ();wrap.style.display='block';
    }catch(e){window.libToast('AI error: '+e.message);}
    btn.disabled=false;btn.innerHTML='🎯 Generate Questions';
  };
  function renderMCQ(){
    document.getElementById('p-mcq-qs').innerHTML=_mcqData.map(function(q,qi){
      return`<div class="mob-mcq-q" id="mcq-q-${qi}">
        <div class="mob-mcq-qt">${qi+1}. ${q.q}</div>
        <div class="mob-mcq-opts">${q.opts.map(function(opt,oi){return`<button class="mob-mcq-opt" onclick="answerMCQ(${qi},${oi})" id="mcq-opt-${qi}-${oi}">${opt}</button>`;}).join('')}</div>
      </div>`;
    }).join('');
  }
  window.answerMCQ=function(qi,oi){
    const q=_mcqData[qi];
    if(document.getElementById('mcq-q-'+qi).dataset.answered)return;
    document.getElementById('mcq-q-'+qi).dataset.answered='1';
    q.opts.forEach(function(_,i){
      const btn=document.getElementById('mcq-opt-'+qi+'-'+i);btn.disabled=true;
      if(i===q.ans)btn.classList.add('correct');else if(i===oi)btn.classList.add('wrong');
    });
    if(oi===q.ans)_mcqScore++;
    _mcqAnswered++;
    if(_mcqAnswered>=_mcqData.length){
      setTimeout(function(){document.getElementById('p-score-num').textContent=_mcqScore+' / '+_mcqData.length;document.getElementById('p-score').style.display='block';},500);
    }
  };
  window.resetMCQ=function(){_mcqScore=0;_mcqAnswered=0;document.getElementById('p-score').style.display='none';renderMCQ();};

  /* ── Comments ── */
  async function loadComments(){
    const el=document.getElementById('p-cmnt-list');
    try{
      const list=await window.libGetComments(bookId);
      if(!list.length){el.innerHTML='<div style="color:#64748b;font-size:.8rem;text-align:center;padding:20px">No feedback yet.</div>';return;}
      el.innerHTML=list.map(function(c){
        const av=c.photoURL?`<img src="${c.photoURL}" alt="">`:
          `<span style="font-size:.55rem;font-weight:800">${window.libInitials(c.displayName||'?')}</span>`;
        return`<div class="mob-ci" id="mob-ci-${c.id}">
          <div class="mob-ci-hdr">
            <div class="mob-ci-av">${av}</div>
            <div class="mob-ci-author">${c.displayName||'Anonymous'}</div>
            <div class="mob-ci-time">${window.libFormatTime(c.createdAt)}</div>
          </div>
          <div class="mob-ci-text">${c.text}</div>
          ${_user?`<button class="mob-ci-reply-btn" onclick="toggleReply('${c.id}',this)">↩ Reply</button>`:''}
          <div class="mob-ci-replies" id="mob-rep-${c.id}"></div>
          <div class="mob-reply-form" id="mob-rf-${c.id}">
            <textarea class="mob-reply-inp" id="mob-ri-${c.id}" placeholder="Write a reply…" rows="2"></textarea>
            <button class="mob-reply-submit" onclick="submitReply('${c.id}')">Reply</button>
          </div>
        </div>`;
      }).join('');
      list.forEach(function(c){if((c.replyCount||0)>0)loadReplies(c.id);});
    }catch(e){el.innerHTML='<div style="color:#64748b;font-size:.8rem;text-align:center;padding:20px">Could not load comments.</div>';}
  }
  window.toggleReply=function(cid,btn){
    const form=document.getElementById('mob-rf-'+cid);
    const isOpen=form.style.display==='block';
    form.style.display=isOpen?'none':'block';
    btn.textContent=isOpen?'↩ Reply':'✕ Cancel';
    if(!isOpen)loadReplies(cid);
  };
  async function loadReplies(cid){
    const wrap=document.getElementById('mob-rep-'+cid);if(!wrap)return;
    const replies=await window.libGetReplies(cid);
    if(!replies.length){wrap.innerHTML='';return;}
    wrap.innerHTML=replies.map(function(r){
      return`<div class="mob-reply-item">
        <div class="mob-reply-meta">
          <span class="mob-reply-author${r.isHost?' host':''}">${r.displayName||'Anonymous'}</span>
          ${r.isHost?`<span class="mob-host-badge">HOST</span>`:''}
        </div>
        <div class="mob-reply-text">${r.text}</div>
      </div>`;
    }).join('');
  }
  window.submitReply=async function(cid){
    if(!_user){window.libToast('Sign in to reply.');return;}
    const inp=document.getElementById('mob-ri-'+cid);
    const text=inp.value.trim();if(!text)return;
    const name=_user.displayName||_user.email?.split('@')[0]||'Student';
    try{
      await window.libAddReply(cid,_user.uid,name,_user.photoURL||'',text,false);
      inp.value='';window.libToast('Reply posted!');
      await loadReplies(cid);
    }catch(e){window.libToast('Error: '+e.message);}
  };
  window.submitComment=async function(){
    if(!_user){window.libToast('Sign in first.');return;}
    const text=document.getElementById('p-cmnt-inp').value.trim();if(!text)return;
    const name=_user.displayName||_user.email?.split('@')[0]||'Student';
    try{
      await window.libAddComment(bookId,_user.uid,name,_user.photoURL||'',text);
      document.getElementById('p-cmnt-inp').value='';
      window.libToast('Feedback posted!');loadComments();
    }catch(e){window.libToast('Error: '+e.message);}
  };

  document.addEventListener('aqs:firebase:ready',init);
  if(window._aqsFirebaseReady)init();
</script>
