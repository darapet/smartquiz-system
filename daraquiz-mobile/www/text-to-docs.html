<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Text → Docs | XZily AI</title>
  <meta name="theme-color" content="#1e1b4b">
  <script src="js/aqs-nav-loader.js"></script>
  <script type="module" src="js/aqs-firebase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0d1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #111827;
      border: 1px solid rgba(99, 102, 241, .25);
      border-radius: 24px;
      padding: 40px 32px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, .5);
    }

    .icon {
      width: 72px;
      height: 72px;
      background: rgba(99, 102, 241, .15);
      border: 1.5px solid rgba(99, 102, 241, .35);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin: 0 auto 22px;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 10px;
      letter-spacing: -.3px;
    }

    p {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.65;
      margin-bottom: 32px;
    }

    p strong {
      color: #c7d2fe;
      font-weight: 600;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 12px;
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:active {
      background: #4f46e5;
      transform: scale(.98);
    }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 15px;
      background: rgba(255, 255, 255, .06);
      color: #9ca3af;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-secondary:active {
      background: rgba(255, 255, 255, .12);
      transform: scale(.98);
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, .07);
      margin: 28px 0 24px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">📝</div>

    <h1>Text → Docs</h1>

    <p>
      For the <strong>best experience</strong> — including printing, downloading,
      and full formatting tools — please open Text → Docs in your web browser.
    </p>

    <button class="btn-primary" onclick="openWebVersion()">
      🌐 Open Website
    </button>

    <hr class="divider">

    <button class="btn-secondary" onclick="goHome()">
      🏠 Go to Home
    </button>
  </div>

  <script>
    function openWebVersion() {
      var url = 'https://darapet.github.io/smartquiz-system/text-to-docs.html';
      var Browser = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Browser;
      if (Browser && Browser.open) {
        Browser.open({ url: url });
      } else {
        window.open(url, '_blank');
      }
    }

    function goHome() {
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
