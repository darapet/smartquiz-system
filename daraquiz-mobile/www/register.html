<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Create Account — DaraQuiz AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Inter',sans-serif;}
body{background:#0d1117;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(99,102,241,.18) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(139,92,246,.15) 0%,transparent 70%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;}
.brand{text-align:center;margin-bottom:28px;}
.brand-icon{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 0 0 1px rgba(99,102,241,.4),0 12px 40px rgba(99,102,241,.35);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 1px rgba(99,102,241,.4),0 12px 40px rgba(99,102,241,.35)}50%{box-shadow:0 0 0 1px rgba(99,102,241,.6),0 12px 48px rgba(99,102,241,.5)}}
.brand-name{font-size:1.4rem;font-weight:800;color:#f1f5f9;letter-spacing:-.02em;margin-bottom:4px;}
.brand-sub{font-size:.875rem;color:#64748b;font-weight:500;}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:28px 26px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 24px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);}
@media(max-width:440px){.card{padding:22px 18px;border-radius:18px;}}
.card-title{font-size:1.05rem;font-weight:700;color:#e2e8f0;margin-bottom:4px;}
.card-sub{font-size:.82rem;color:#64748b;margin-bottom:22px;line-height:1.5;}
.alert{display:none;padding:11px 14px;border-radius:10px;font-size:.83rem;font-weight:500;margin-bottom:16px;line-height:1.5;}
.alert.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.alert.success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;}
.alert.show{display:block;}
.field{margin-bottom:15px;}
.field-label{display:block;font-size:.75rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;}
.field-input{width:100%;padding:13px 15px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;color:#e2e8f0;font-size:.95rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s,background .15s;}
.field-input:focus{border-color:rgba(99,102,241,.65);background:rgba(99,102,241,.07);}
.field-input::placeholder{color:#475569;}
.pw-wrap{position:relative;}
.pw-wrap .field-input{padding-right:44px;}
.pw-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#475569;padding:4px;display:flex;align-items:center;transition:color .15s;}
.pw-toggle:hover{color:#94a3b8;}
.pw-strength{height:4px;border-radius:2px;background:rgba(255,255,255,.08);margin-top:7px;overflow:hidden;}
.pw-strength-bar{height:100%;width:0;border-radius:2px;transition:width .3s,background .3s;}
.submit-btn{width:100%;padding:14px 20px;margin-top:6px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:transform .1s,box-shadow .15s,opacity .15s;box-shadow:0 4px 20px rgba(99,102,241,.4);display:flex;align-items:center;justify-content:center;gap:8px;}
.submit-btn:hover{box-shadow:0 6px 28px rgba(99,102,241,.55);transform:translateY(-1px);}
.submit-btn:active{transform:translateY(0);}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.step-done{display:none;text-align:center;padding:20px 0;}
.done-icon{font-size:2.8rem;margin-bottom:12px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.done-title{font-size:1.1rem;font-weight:700;color:#e2e8f0;margin-bottom:6px;}
.done-sub{font-size:.85rem;color:#94a3b8;line-height:1.5;}
.bottom-link{text-align:center;margin-top:18px;font-size:.82rem;color:#475569;}
.bottom-link a{color:#818cf8;text-decoration:none;font-weight:600;}
.bottom-link a:hover{color:#a5b4fc;}
</style>
<script>
window.AQS={ajax_url:'firebase',nonce:'',home_url:'index.html',studio_url:'studio.html',register_url:'register.html',login_url:'login.html',is_logged_in:false,is_host:false,is_admin:false,groq_key:'',plugin_url:'./'};
</script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script type="module" src="js/aqs-firebase.js"></script>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg width="30" height="30" viewBox="0 0 36 36" fill="none">
        <polygon points="18,2 34,10 34,26 18,34 2,26 2,10" fill="white" opacity="0.9"/>
        <circle cx="18" cy="18" r="6" fill="#6366f1"/>
      </svg>
    </div>
    <div class="brand-name">DaraQuiz AI</div>
    <div class="brand-sub">Create your free account</div>
  </div>

  <div class="card">
    <div id="aqs-register-alert" class="alert"></div>

    <div id="step-form">
      <div class="card-title">Join DaraQuiz AI</div>
      <div class="card-sub">Sign up with your email and password to get full access.</div>

      <form id="aqs-register-form" autocomplete="off" novalidate>
        <div class="field">
          <label class="field-label" for="reg-name">Full Name</label>
          <input type="text" id="reg-name" class="field-input" placeholder="e.g. John Doe" autocomplete="name" required />
        </div>
        <div class="field">
          <label class="field-label" for="reg-email">Email Address</label>
          <input type="email" id="reg-email" class="field-input" placeholder="you@example.com" autocomplete="email" inputmode="email" required />
        </div>
        <div class="field">
          <label class="field-label" for="reg-password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="reg-password" class="field-input" placeholder="At least 6 characters" autocomplete="new-password" required />
            <button type="button" class="pw-toggle" data-target="reg-password" aria-label="Toggle">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="pw-strength"><div class="pw-strength-bar" id="reg-pw-bar"></div></div>
        </div>
        <div class="field">
          <label class="field-label" for="reg-confirm">Confirm Password</label>
          <div class="pw-wrap">
            <input type="password" id="reg-confirm" class="field-input" placeholder="Repeat your password" autocomplete="new-password" required />
            <button type="button" class="pw-toggle" data-target="reg-confirm" aria-label="Toggle">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="submit-btn" id="aqs-reg-submit">
          <span id="reg-btn-label">Create Account</span>
          <span class="spinner" id="reg-spinner"></span>
        </button>
      </form>
    </div>

    <div id="step-done" class="step-done">
      <div class="done-icon">🎉</div>
      <div class="done-title" id="done-title">Account created!</div>
      <div class="done-sub" id="done-sub">Taking you to your dashboard…</div>
    </div>
  </div>

  <div class="bottom-link">Already have an account? <a href="login.html">Sign in here</a></div>
</div>

<script>
(function () {
  'use strict';
  document.querySelectorAll('.pw-toggle').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var input = document.getElementById(btn.getAttribute('data-target'));
      if (input) input.type = input.type === 'password' ? 'text' : 'password';
    });
  });
  document.getElementById('reg-password').addEventListener('input', function () {
    var pw = this.value, score = 0;
    if (pw.length >= 6)  score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    var bar = document.getElementById('reg-pw-bar');
    bar.style.width = Math.min(100, score * 20) + '%';
    bar.style.background = score <= 1 ? '#ef4444' : score <= 2 ? '#f59e0b' : score <= 3 ? '#eab308' : '#22c55e';
  });
  function showAlert(msg, type) {
    var el = document.getElementById('aqs-register-alert');
    el.textContent = msg; el.className = 'alert show ' + (type || 'error');
  }
  function hideAlert() { document.getElementById('aqs-register-alert').className = 'alert'; }
  function setLoading(on) {
    document.getElementById('aqs-reg-submit').disabled = on;
    document.getElementById('reg-btn-label').style.display = on ? 'none' : '';
    document.getElementById('reg-spinner').style.display   = on ? 'inline-block' : 'none';
  }
  document.getElementById('aqs-register-form').addEventListener('submit', function (e) {
    e.preventDefault(); hideAlert();
    var name    = (document.getElementById('reg-name').value    || '').trim();
    var email   = (document.getElementById('reg-email').value   || '').trim().toLowerCase();
    var pw      = (document.getElementById('reg-password').value || '');
    var confirm = (document.getElementById('reg-confirm').value  || '');
    if (!name)  { showAlert('Please enter your full name.', 'error'); return; }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert('Please enter a valid email address.', 'error'); return; }
    if (pw.length < 6)  { showAlert('Password must be at least 6 characters.', 'error'); return; }
    if (pw !== confirm) { showAlert('Passwords do not match.', 'error'); return; }
    setLoading(true);
    window._aqsIsRegistering = true;
    var username = name.replace(/\s+/g,'').toLowerCase().replace(/[^a-z0-9]/g,'').substring(0,18)
                   || email.split('@')[0].replace(/[^a-z0-9]/g,'').substring(0,18);
    function doRegister() {
      if (typeof window.aqsAjax !== 'function') { setTimeout(doRegister, 250); return; }
      window.aqsAjax(
        { action:'aqs_register', name:name, username:username, email:email, role:'student', password:pw },
        function (res) {
          if (res && res.success) {
            document.getElementById('step-form').style.display = 'none';
            document.getElementById('step-done').style.display = '';
            document.getElementById('done-title').textContent = 'Welcome, ' + name.split(' ')[0] + '!';
            document.getElementById('done-sub').textContent   = 'Your account is ready. Going to your dashboard…';
            setTimeout(function () {
              window._aqsIsRegistering = false;
              window.location.replace((res.data && res.data.redirect) || 'user-dashboard.html');
            }, 1200);
          } else {
            window._aqsIsRegistering = false;
            var msg = (res && res.data) ? (typeof res.data === 'string' ? res.data : (res.data.message || 'Registration failed.')) : 'Registration failed. Please try again.';
            showAlert(msg, 'error'); setLoading(false);
          }
        },
        function (err) {
          window._aqsIsRegistering = false;
          showAlert((err && err.message) || 'Registration failed. Please try again.', 'error');
          setLoading(false);
        }
      );
    }
    doRegister();
  });
})();
</script>
<script src="js/aqs-session.js"></script>
<script src="js/aqs-update-check.js"></script>
<script src="js/aqs-whats-new.js"></script>
<script src="capacitor-bridge.js"></script>
</body>
</html>
