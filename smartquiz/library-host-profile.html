<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#080910">
<title>Host Profile — xzily Library</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/aqs-library.css">
</head>
<body>
<div class="lib-page-bg"></div>

<header class="lib-hdr">
  <a href="library.html" class="lib-logo">📚 xzily Library</a>
  <div class="lib-hdr-actions">
    <a href="library.html" class="lib-back">← Library</a>
    <a href="library-host-view.html" class="lib-back" id="hdr-manage" style="display:none">My Dashboard</a>
  </div>
</header>

<!-- COVER -->
<div class="lhp-cover">
  <div class="lhp-cover-grid"></div>
</div>

<!-- PROFILE BODY -->
<div class="lhp-profile-wrap">

  <!-- AVATAR ROW -->
  <div class="lhp-avatar-row">
    <div class="lhp-avatar" id="lhp-avatar">
      <span class="lib-spinner" style="width:28px;height:28px;border-color:rgba(255,255,255,.2);border-top-color:#fff;"></span>
    </div>
    <div class="lhp-avatar-btns" id="lhp-avatar-btns">
      <button type="button" class="lib-btn lib-btn-ghost lib-btn-sm" onclick="location.href='library-read.html?id='+window._pendingBook" id="lhp-read-btn" style="display:none">
        📖 Read Book
      </button>
      <button type="button" class="lib-btn-follow" id="lhp-follow-btn" onclick="doFollow()" style="display:none">
        + Follow
      </button>
      <a href="library-host-view.html" class="lib-btn lib-btn-primary lib-btn-sm" id="lhp-edit-btn" style="display:none">
        ✏️ Manage Profile
      </a>
    </div>
  </div>

  <!-- NAME & BIO -->
  <div id="lhp-name" class="lhp-name" style="min-height:36px"></div>
  <div id="lhp-handle" class="lhp-handle"></div>
  <div id="lhp-bio" class="lhp-bio"></div>

  <!-- META TAGS -->
  <div class="lhp-meta-row" id="lhp-meta-row"></div>

  <!-- STATS -->
  <div class="lhp-stats-strip">
    <div class="lhp-stat" onclick="switchTab('books',document.querySelector('.lhp-tab'))">
      <div class="lhp-stat-num" id="lhp-books-count">—</div>
      <div class="lhp-stat-lbl">Books</div>
    </div>
    <div class="lhp-stat" onclick="switchTab('followers',document.querySelectorAll('.lhp-tab')[1])">
      <div class="lhp-stat-num" id="lhp-followers-count">—</div>
      <div class="lhp-stat-lbl">Followers</div>
    </div>
    <div class="lhp-stat">
      <div class="lhp-stat-num" id="lhp-readers-count">—</div>
      <div class="lhp-stat-lbl">Readers</div>
    </div>
    <div class="lhp-stat">
      <div class="lhp-stat-num" id="lhp-likes-count">—</div>
      <div class="lhp-stat-lbl">Likes</div>
    </div>
  </div>

  <div class="lhp-divider"></div>

  <!-- TABS -->
  <div class="lhp-tabs">
    <div class="lhp-tab active" onclick="switchTab('books',this)">📚 Books</div>
    <div class="lhp-tab" onclick="switchTab('followers',this)">👥 Followers</div>
    <div class="lhp-tab" onclick="switchTab('about',this)">ℹ️ About</div>
  </div>

  <!-- BOOKS TAB -->
  <div class="lhp-tab-body active" id="tab-books">
    <div id="lhp-books-grid" class="lhp-books-grid">
      <div class="lib-skeleton-card"><div class="lib-skeleton-thumb"></div><div class="lib-skeleton-body"><div class="lib-skeleton-line"></div><div class="lib-skeleton-line short"></div></div></div>
      <div class="lib-skeleton-card"><div class="lib-skeleton-thumb"></div><div class="lib-skeleton-body"><div class="lib-skeleton-line"></div><div class="lib-skeleton-line short"></div></div></div>
      <div class="lib-skeleton-card"><div class="lib-skeleton-thumb"></div><div class="lib-skeleton-body"><div class="lib-skeleton-line"></div><div class="lib-skeleton-line short"></div></div></div>
      <div class="lib-skeleton-card"><div class="lib-skeleton-thumb"></div><div class="lib-skeleton-body"><div class="lib-skeleton-line"></div><div class="lib-skeleton-line short"></div></div></div>
    </div>
  </div>

  <!-- FOLLOWERS TAB -->
  <div class="lhp-tab-body" id="tab-followers">
    <div id="lhp-followers-list">
      <div class="lib-empty" style="padding:40px 0">
        <div class="lib-empty-icon">👥</div>
        <div class="lib-empty-title">Click to load followers</div>
      </div>
    </div>
  </div>

  <!-- ABOUT TAB -->
  <div class="lhp-tab-body" id="tab-about">
    <div id="lhp-about-card" style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;">
      <div style="color:#64748b;font-size:.85rem;text-align:center;padding:20px">Loading…</div>
    </div>
  </div>

</div>

<div class="lib-toast" id="lib-toast"></div>

<script type="module" src="js/aqs-firebase.js"></script>
<script type="module" src="js/aqs-groq-key.js"></script>
<script type="module" src="js/aqs-library.js"></script>
<script type="module">
  const params = new URLSearchParams(location.search);
  const hostUid = params.get('uid');
  window._pendingBook = params.get('book') || '';
  let _currentUser = null;
  let _profile = null;
  let _books = [];
  let _stats = null;
  let _profileLoaded = false;

  if (!hostUid) { location.href = 'library.html'; }

  /* ── Auth: only controls buttons, does NOT trigger loading ── */
  window.libOnAuth(async function(user) {
    _currentUser = user;
    const isOwn = user && user.uid === hostUid;

    if (isOwn) {
      document.getElementById('lhp-edit-btn').style.display = 'inline-flex';
      document.getElementById('hdr-manage').style.display = 'inline-flex';
      document.getElementById('lhp-follow-btn').style.display = 'none';
    } else if (user) {
      const followBtn = document.getElementById('lhp-follow-btn');
      followBtn.style.display = 'inline-flex';
      try {
        const isF = await window.libIsFollowing(user.uid, hostUid);
        setFollowUI(isF);
      } catch(e) {}
    }
  });

  /* ── Main init: loads profile + books independently of auth ── */
  async function init() {
    if (_profileLoaded) return;
    _profileLoaded = true;
    await Promise.all([loadProfile(), loadBooks()]);
  }

  async function loadProfile() {
    try {
      _profile = await window.libGetProfile(hostUid);
      if (!_profile) {
        document.getElementById('lhp-name').textContent = 'Unknown Host';
        document.getElementById('lhp-about-card').innerHTML = '<div style="color:#64748b;font-size:.85rem;text-align:center;padding:20px">No profile found.</div>';
        return;
      }

      /* Avatar */
      const avEl = document.getElementById('lhp-avatar');
      if (_profile.photoURL) {
        avEl.innerHTML = `<img src="${_profile.photoURL}" alt="">`;
      } else {
        avEl.textContent = window.libInitials(_profile.displayName || '?');
      }

      document.getElementById('lhp-name').textContent = _profile.displayName || 'Anonymous';
      document.getElementById('lhp-handle').textContent = _profile.institution || '';
      if (_profile.bio) document.getElementById('lhp-bio').textContent = _profile.bio;

      /* Meta tags */
      const meta = [];
      if (_profile.institutionType) meta.push({ icon: '🎓', text: _profile.institutionType.replace(/_/g,' ') });
      if (_profile.department) meta.push({ icon: '📘', text: _profile.department });
      document.getElementById('lhp-meta-row').innerHTML = meta.map(m =>
        `<div class="lhp-meta-tag">${m.icon} ${m.text}</div>`
      ).join('');

      /* Read book button */
      if (window._pendingBook) {
        document.getElementById('lhp-read-btn').style.display = 'inline-flex';
      }

      /* Load counts in background — don't block profile/books render */
      loadCounts();

      /* About card — shown immediately with placeholder numbers, counts fill in later */
      document.getElementById('lhp-about-card').innerHTML = `
        <div style="display:flex;flex-direction:column;gap:18px;">
          <div>
            <div style="font-size:.68rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;">Full Name</div>
            <div style="font-size:.92rem;color:#e2e8f0;font-weight:600;">${_profile.displayName || '—'}</div>
          </div>
          <div>
            <div style="font-size:.68rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;">Institution</div>
            <div style="font-size:.88rem;color:#cbd5e1;">${_profile.institution || '—'}</div>
          </div>
          <div>
            <div style="font-size:.68rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;">Department</div>
            <div style="font-size:.88rem;color:#cbd5e1;">${_profile.department || '—'}</div>
          </div>
          ${_profile.bio ? `<div>
            <div style="font-size:.68rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;">Bio</div>
            <div style="font-size:.88rem;color:#cbd5e1;line-height:1.65;">${_profile.bio}</div>
          </div>` : ''}
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding-top:4px;border-top:1px solid rgba(255,255,255,.06);">
            <div style="text-align:center;padding:12px 8px;background:rgba(99,102,241,.07);border-radius:10px;border:1px solid rgba(99,102,241,.14);">
              <div id="about-books-num" style="font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">—</div>
              <div style="font-size:.65rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:3px;">Books</div>
            </div>
            <div style="text-align:center;padding:12px 8px;background:rgba(99,102,241,.07);border-radius:10px;border:1px solid rgba(99,102,241,.14);">
              <div id="about-readers-num" style="font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">—</div>
              <div style="font-size:.65rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:3px;">Readers</div>
            </div>
            <div style="text-align:center;padding:12px 8px;background:rgba(99,102,241,.07);border-radius:10px;border:1px solid rgba(99,102,241,.14);">
              <div id="about-likes-num" style="font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">—</div>
              <div style="font-size:.65rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:3px;">Likes</div>
            </div>
          </div>
        </div>`;

    } catch(e) {
      document.getElementById('lhp-name').textContent = 'Profile unavailable';
      document.getElementById('lhp-about-card').innerHTML = `<div style="color:#64748b;font-size:.85rem;text-align:center;padding:20px">Could not load: ${e.message}</div>`;
    }
  }

  async function loadBooks() {
    const grid = document.getElementById('lhp-books-grid');
    try {
      _books = await window.libGetMyBooks(hostUid);
      if (!_books.length) {
        grid.innerHTML = `<div class="lib-empty" style="grid-column:1/-1"><div class="lib-empty-icon">📭</div><div class="lib-empty-title">No books uploaded yet</div></div>`;
        return;
      }
      /* Render directly into the grid — no extra wrapper div */
      grid.innerHTML = _books.map(b => bookCardHTML(b)).join('');
    } catch(e) {
      grid.innerHTML = `<div class="lib-empty" style="grid-column:1/-1"><div class="lib-empty-icon">⚠️</div><div class="lib-empty-title">Could not load books</div><div class="lib-empty-sub">${e.message}</div></div>`;
    }
  }

  function bookCardHTML(b) {
    /* Use profile name for ALL books on this page — fixes "anonymous" for old books */
    const upName = (_profile && _profile.displayName) ? _profile.displayName : (b.uploaderName && b.uploaderName !== 'anonymous' ? b.uploaderName : 'Unknown Author');
    const upPhoto = (_profile && _profile.photoURL) ? _profile.photoURL : (b.uploaderPhotoURL || '');
    const avHtml = upPhoto
      ? `<img src="${upPhoto}" alt="">`
      : `<span style="font-size:.55rem;font-weight:800;">${window.libInitials(upName)}</span>`;
    const thumb = b.thumbnailUrl
      ? `<img src="${b.thumbnailUrl}" alt="" loading="lazy">`
      : `<div class="lib-card-thumb-placeholder"><div class="lib-card-thumb-icon">📖</div><div class="lib-card-thumb-label">${(b.course||'').substring(0,18)}</div></div>`;
    return `<div class="lib-card" onclick="location.href='library-read.html?id=${b.id}'">
      <div class="lib-card-thumb">${thumb}</div>
      <div class="lib-card-body">
        <div class="lib-card-title">${b.title||'Untitled'}</div>
        <div class="lib-card-uploader" onclick="event.stopPropagation()">
          <div class="lib-card-uploader-av">${avHtml}</div>
          <span class="lib-card-uploader-name">${upName}</span>
        </div>
        <div class="lib-card-meta">
          ${b.level?`<div><span class="lib-card-level">${b.level}</span></div>`:''}
          <div style="font-size:.67rem;color:#64748b;">${(b.course||'').substring(0,24)}</div>
        </div>
        <div class="lib-card-stats">
          <span class="lib-card-stat">👁 ${b.views||0}</span>
          <span class="lib-card-stat">♡ ${b.likes||0}</span>
          <span class="lib-card-stat">💬 ${b.commentCount||0}</span>
        </div>
      </div>
    </div>`;
  }

  function setFollowUI(isFollowing) {
    const btn = document.getElementById('lhp-follow-btn');
    if (isFollowing) {
      btn.textContent = '✓ Following';
      btn.classList.add('following');
    } else {
      btn.textContent = '+ Follow';
      btn.classList.remove('following');
    }
  }

  window.doFollow = async function() {
    if (!_currentUser) { location.href = 'login.html'; return; }
    const btn = document.getElementById('lhp-follow-btn');
    btn.disabled = true;
    try {
      const isNowFollowing = await window.libFollowToggle(_currentUser.uid, hostUid);
      setFollowUI(isNowFollowing);
      const prev = parseInt(document.getElementById('lhp-followers-count').textContent) || 0;
      document.getElementById('lhp-followers-count').textContent = isNowFollowing ? prev + 1 : Math.max(0, prev - 1);
      window.libToast(isNowFollowing ? '✅ Now following!' : 'Unfollowed');
    } catch(e) {
      window.libToast('Error: ' + e.message);
    }
    btn.disabled = false;
  };

  /* Load follower count + stats separately so profile renders fast */
  async function loadCounts() {
    function withTimeout(promise, ms) {
      return Promise.race([
        promise,
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))
      ]);
    }
    try {
      const follCount = await withTimeout(window.libGetFollowerCount(hostUid), 8000);
      document.getElementById('lhp-followers-count').textContent = follCount;
    } catch(e) { document.getElementById('lhp-followers-count').textContent = '0'; }

    try {
      const stats = await withTimeout(window.libGetMyStats(hostUid), 8000);
      _stats = stats;
      document.getElementById('lhp-books-count').textContent = stats.books;
      document.getElementById('lhp-readers-count').textContent = stats.readers;
      document.getElementById('lhp-likes-count').textContent = stats.likes;
      const bn = document.getElementById('about-books-num');
      const rn = document.getElementById('about-readers-num');
      const ln = document.getElementById('about-likes-num');
      if (bn) bn.textContent = stats.books;
      if (rn) rn.textContent = stats.readers;
      if (ln) ln.textContent = stats.likes;
    } catch(e) {
      ['lhp-books-count','lhp-readers-count','lhp-likes-count'].forEach(id => {
        document.getElementById(id).textContent = '0';
      });
    }
  }

  window.switchTab = function(tab, el) {
    document.querySelectorAll('.lhp-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.lhp-tab-body').forEach(t => t.classList.remove('active'));
    if (el) el.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'followers') loadFollowers();
  };

  let _followersLoaded = false;
  async function loadFollowers() {
    if (_followersLoaded) return;
    const el = document.getElementById('lhp-followers-list');
    el.innerHTML = `<div style="color:#64748b;font-size:.85rem;text-align:center;padding:24px;"><span class="lib-spinner"></span></div>`;

    function withTimeout(promise, ms) {
      return Promise.race([
        promise,
        new Promise((_, rej) => setTimeout(() => rej(new Error('Request timed out')), ms))
      ]);
    }

    try {
      const uids = await withTimeout(window.libGetFollowers(hostUid), 10000);
      _followersLoaded = true;
      if (!uids.length) {
        el.innerHTML = `<div class="lib-empty"><div class="lib-empty-icon">👥</div><div class="lib-empty-title">No followers yet</div><div class="lib-empty-sub">Share your profile link to grow your audience</div></div>`;
        return;
      }
      const profiles = await withTimeout(
        Promise.all(uids.map(uid => window.libGetProfile(uid).catch(() => null))),
        10000
      );
      const valid = profiles.filter(Boolean);
      if (!valid.length) {
        el.innerHTML = `<div class="lib-empty"><div class="lib-empty-title">No followers yet</div></div>`;
        return;
      }
      el.innerHTML = valid.map(p => `
        <div class="lhp-follower-item">
          <div class="lhp-follower-av">${p.photoURL ? `<img src="${p.photoURL}" alt="">` : window.libInitials(p.displayName||'?')}</div>
          <div>
            <div class="lhp-follower-name">${p.displayName || 'Anonymous'}</div>
            <div class="lhp-follower-sub">${p.institution || ''}</div>
          </div>
        </div>`).join('');
    } catch(e) {
      _followersLoaded = false;
      el.innerHTML = `<div style="color:#ef4444;font-size:.82rem;text-align:center;padding:24px;">
        Could not load followers.<br>
        <button onclick="loadFollowers()" style="margin-top:10px;padding:6px 16px;border-radius:8px;border:1px solid rgba(99,102,241,.3);background:rgba(99,102,241,.1);color:#a5b4fc;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;">
          Try Again
        </button>
      </div>`;
    }
  }
  window.loadFollowers = loadFollowers;

  document.addEventListener('aqs:firebase:ready', init);
  if (window._aqsFirebaseReady) init();
</script>
</body>
</html>
