<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0a0b14">
<title>📖 Reading — xzily Library</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/aqs-library.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
html,body{height:100%;overflow:hidden;}

/* ── HEADER ── */
.rdr-hdr{
  position:fixed;top:0;left:0;right:0;z-index:300;height:54px;
  display:flex;align-items:center;gap:10px;padding:0 16px;
  background:rgba(10,11,20,.97);border-bottom:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(16px);
}
.rdr-logo{
  font-size:.82rem;font-weight:900;
  background:linear-gradient(135deg,#6366f1,#8b5cf6,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;text-decoration:none;flex-shrink:0;
}
.rdr-book-title{
  flex:1;min-width:0;font-size:.8rem;font-weight:600;color:#94a3b8;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.rdr-hdr-acts{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.rdr-hbtn{
  padding:6px 11px;border-radius:8px;
  border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);
  color:#94a3b8;font-size:.73rem;font-weight:700;
  cursor:pointer;font-family:inherit;text-decoration:none;
  display:inline-flex;align-items:center;gap:4px;
  transition:all .18s;white-space:nowrap;
}
.rdr-hbtn:hover{border-color:rgba(255,255,255,.16);color:#e2e8f0;}
.rdr-hbtn.ac{border-color:rgba(99,102,241,.35);background:rgba(99,102,241,.08);color:#a5b4fc;}
.rdr-hbtn.ac:hover{background:rgba(99,102,241,.16);border-color:rgba(99,102,241,.55);}

/* ── STAGE ── */
.rdr-stage{
  position:fixed;top:54px;bottom:62px;left:0;right:0;
  overflow-y:auto;background:#0b0c1a;
  -webkit-overflow-scrolling:touch;
}
.rdr-prog-bar{position:sticky;top:0;height:3px;background:rgba(255,255,255,.05);z-index:10;flex-shrink:0;}
.rdr-prog-fill{height:100%;background:linear-gradient(90deg,#6366f1,#a78bfa);transition:width .35s;width:0%;}

.rdr-page-outer{max-width:800px;margin:0 auto;padding:32px 24px 60px;}

/* Page tag row */
.rdr-page-tag{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;padding-bottom:14px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.rdr-page-badge{
  font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:#6366f1;padding:4px 12px;border-radius:20px;
  background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);
}
.rdr-page-booklabel{font-size:.7rem;color:#334155;font-style:italic;}

/* Content */
.rdr-content{
  font-family:'Lora',Georgia,serif;font-size:1.05rem;
  line-height:1.95;color:#cbd5e1;word-break:break-word;overflow-wrap:anywhere;
}
.rdr-content p{margin-bottom:1.15em;}
.rdr-content h1{
  font-family:'Inter',sans-serif;font-size:1.4rem;font-weight:800;
  color:#e2e8f0;margin:1.6em 0 .5em;line-height:1.3;
}
.rdr-content h2{
  font-family:'Inter',sans-serif;font-size:1.05rem;font-weight:700;
  color:#a5b4fc;margin:1.4em 0 .4em;line-height:1.3;
}
.rdr-content h3{
  font-family:'Inter',sans-serif;font-size:.92rem;font-weight:700;
  color:#94a3b8;margin:1.2em 0 .3em;
}
.rdr-content strong{color:#e2e8f0;font-weight:700;}
.rdr-content em{color:#c4b5fd;}
.rdr-content ul,.rdr-content ol{padding-left:1.6em;margin-bottom:1em;}
.rdr-content li{margin-bottom:.4em;line-height:1.75;}
.rdr-content table{width:100%;border-collapse:collapse;margin-bottom:1.2em;font-size:.88rem;}
.rdr-content th{
  background:rgba(99,102,241,.12);color:#a5b4fc;font-family:'Inter',sans-serif;
  font-weight:700;padding:9px 12px;border:1px solid rgba(99,102,241,.2);text-align:left;
}
.rdr-content td{
  padding:8px 12px;border:1px solid rgba(255,255,255,.07);color:#cbd5e1;vertical-align:top;
}
.rdr-content tr:nth-child(even) td{background:rgba(255,255,255,.02);}

/* Loading */
.rdr-loading{
  display:flex;flex-direction:column;align-items:center;
  gap:16px;padding:80px 20px;color:#64748b;font-size:.88rem;
}
.rdr-spinner{
  width:38px;height:38px;
  border:3px solid rgba(99,102,241,.2);border-top-color:#6366f1;
  border-radius:50%;animation:rdr-spin .8s linear infinite;
}
@keyframes rdr-spin{100%{transform:rotate(360deg)}}

/* Canvas fallback */
.rdr-canvas-wrap{display:flex;justify-content:center;}
#rdr-canvas{max-width:100%;box-shadow:0 8px 48px rgba(0,0,0,.7);border-radius:3px;display:none;}

/* ── FOOTER ── */
.rdr-footer{
  position:fixed;bottom:0;left:0;right:0;height:62px;z-index:300;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;gap:10px;
  background:rgba(10,11,20,.97);border-top:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(16px);
}
.rdr-nav-grp{display:flex;align-items:center;gap:8px;}
.rdr-pg-btn{
  padding:8px 14px;border-radius:9px;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
  color:#94a3b8;font-size:.8rem;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .18s;
}
.rdr-pg-btn:not(:disabled):hover{border-color:rgba(99,102,241,.4);color:#a5b4fc;background:rgba(99,102,241,.08);}
.rdr-pg-btn:disabled{opacity:.3;cursor:not-allowed;}
.rdr-pg-btn.nxt{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.3);color:#a5b4fc;}
.rdr-pg-btn.nxt:not(:disabled):hover{background:rgba(99,102,241,.22);border-color:rgba(99,102,241,.55);}
.rdr-pg-num{font-size:.78rem;font-weight:700;color:#475569;min-width:64px;text-align:center;}
.rdr-act-grp{display:flex;align-items:center;gap:6px;}
.rdr-act-btn{
  padding:7px 11px;border-radius:9px;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
  color:#94a3b8;font-size:.76rem;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .18s;
  display:inline-flex;align-items:center;gap:4px;text-decoration:none;
}
.rdr-act-btn:hover{border-color:rgba(255,255,255,.18);color:#e2e8f0;}
.rdr-act-btn.liked{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#fca5a5;}

/* ── SLIDE PANEL ── */
.rdr-overlay{
  position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);
  display:none;justify-content:flex-end;
}
.rdr-overlay.open{display:flex;}
.rdr-panel{
  width:min(490px,100vw);height:100%;
  background:#0d0e1c;border-left:1px solid rgba(255,255,255,.08);
  display:flex;flex-direction:column;
  animation:rdr-slide-in .22s cubic-bezier(.22,1,.36,1);
}
@keyframes rdr-slide-in{from{transform:translateX(100%)}to{transform:translateX(0)}}
.rdr-panel-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;
}
.rdr-panel-title{font-size:.95rem;font-weight:800;color:#e2e8f0;}
.rdr-panel-close{
  width:32px;height:32px;border-radius:8px;
  border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);
  color:#94a3b8;font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all .18s;
}
.rdr-panel-close:hover{background:rgba(255,255,255,.1);color:#e2e8f0;}
.rdr-panel-body{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch;}

/* Panel content */
.rdr-panel-btn{
  width:100%;padding:12px 16px;border-radius:10px;
  border:1px solid rgba(99,102,241,.3);background:rgba(99,102,241,.08);color:#a5b4fc;
  font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .18s;display:flex;align-items:center;justify-content:center;
  gap:8px;margin-bottom:10px;
}
.rdr-panel-btn:hover{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.5);}
.rdr-panel-btn:disabled{opacity:.4;cursor:not-allowed;}
.rdr-ai-out{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:10px;padding:16px;font-size:.83rem;line-height:1.85;color:#cbd5e1;
  display:none;margin-bottom:10px;
}
.rdr-ai-out strong{color:#e2e8f0;}
.rdr-ai-out h2{color:#a5b4fc;font-size:.88rem;margin:12px 0 5px;font-family:'Inter',sans-serif;}

/* MCQ */
.rdr-mcq-wrap{display:none;}
.rdr-mcq-q{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:14px;margin-bottom:10px;
}
.rdr-mcq-qt{font-size:.85rem;font-weight:600;color:#e2e8f0;margin-bottom:10px;line-height:1.5;}
.rdr-mcq-opts{display:flex;flex-direction:column;gap:6px;}
.rdr-mcq-opt{
  padding:9px 12px;border-radius:8px;
  border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);
  color:#94a3b8;font-size:.8rem;cursor:pointer;transition:all .18s;
  text-align:left;font-family:inherit;
}
.rdr-mcq-opt:hover:not(:disabled){border-color:rgba(99,102,241,.4);color:#e2e8f0;}
.rdr-mcq-opt.correct{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:#86efac;}
.rdr-mcq-opt.wrong{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5;}
.rdr-score{
  background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(139,92,246,.08));
  border:1px solid rgba(99,102,241,.25);border-radius:12px;
  padding:24px;text-align:center;display:none;margin-top:12px;
}
.rdr-score-num{
  font-size:2.6rem;font-weight:900;
  background:linear-gradient(135deg,#6366f1,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.rdr-score-lbl{font-size:.85rem;color:#64748b;margin-top:4px;}

/* Comments */
.rdr-ci{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:10px;padding:12px 14px;margin-bottom:8px;margin-top:12px;
}
.rdr-ci-author{font-size:.72rem;font-weight:700;color:#a5b4fc;margin-bottom:5px;}
.rdr-ci-text{font-size:.82rem;color:#cbd5e1;line-height:1.6;}
.rdr-ci-time{font-size:.67rem;color:#475569;margin-top:4px;}
.rdr-comment-input{
  width:100%;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);border-radius:9px;
  padding:11px 13px;color:#e2e8f0;font-size:.85rem;
  font-family:inherit;outline:none;resize:none;min-height:80px;
  margin-bottom:8px;transition:border-color .2s;
}
.rdr-comment-input:focus{border-color:rgba(99,102,241,.4);}
.rdr-comment-submit{
  width:100%;padding:10px;border-radius:9px;border:none;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;
}

/* Responsive */
@media(max-width:580px){
  .rdr-hdr-acts .hide-mob{display:none;}
  .rdr-act-grp .rdr-dl-btn{display:none;}
  .rdr-panel{max-width:100vw;}
  .rdr-page-booklabel{display:none;}
}
</style>
</head>
<body>

<!-- STICKY HEADER -->
<header class="rdr-hdr">
  <a href="library.html" class="rdr-logo">📚 xzily Library</a>
  <span class="rdr-book-title" id="rdr-title">Loading…</span>
  <div class="rdr-hdr-acts">
    <a href="dashboard.html" class="rdr-hbtn hide-mob">🏠 Home</a>
    <button class="rdr-hbtn ac hide-mob" onclick="openPanel('ai')">✨ Explain</button>
    <button class="rdr-hbtn ac" onclick="openPanel('mcq')">🎯 Quiz</button>
    <button class="rdr-hbtn" onclick="history.back()">← Back</button>
  </div>
</header>

<!-- READING STAGE -->
<div class="rdr-stage" id="rdr-stage">
  <div class="rdr-prog-bar"><div class="rdr-prog-fill" id="rdr-prog"></div></div>

  <div class="rdr-page-outer" id="rdr-page-outer">
    <!-- Loading -->
    <div class="rdr-loading" id="rdr-loading">
      <div class="rdr-spinner"></div>
      <span>Loading document…</span>
    </div>

    <!-- Page header tag -->
    <div class="rdr-page-tag" id="rdr-page-tag" style="display:none">
      <span class="rdr-page-badge" id="rdr-page-badge">Page 1 of 1</span>
      <span class="rdr-page-booklabel" id="rdr-page-booklabel"></span>
    </div>

    <!-- Parsed text content -->
    <div class="rdr-content" id="rdr-content" style="display:none"></div>

    <!-- PDF canvas fallback -->
    <div class="rdr-canvas-wrap" id="rdr-canvas-wrap" style="display:none">
      <canvas id="rdr-canvas"></canvas>
    </div>
  </div>
</div>

<!-- FOOTER NAV -->
<footer class="rdr-footer">
  <div class="rdr-nav-grp">
    <button class="rdr-pg-btn" id="rdr-prev" onclick="prevPage()" disabled>◀ Prev</button>
    <span class="rdr-pg-num" id="rdr-pg-num">— / —</span>
    <button class="rdr-pg-btn nxt" id="rdr-next" onclick="nextPage()" disabled>Next ▶</button>
  </div>
  <div class="rdr-act-grp">
    <button class="rdr-act-btn" id="rdr-like-btn" onclick="toggleLike()">
      <span id="rdr-like-icon">🤍</span><span id="rdr-like-count">0</span>
    </button>
    <button class="rdr-act-btn" onclick="openPanel('comments')">💬 Feedback</button>
    <a id="rdr-dl" class="rdr-act-btn rdr-dl-btn" style="display:none">⬇ Download</a>
  </div>
</footer>

<!-- SLIDE PANEL -->
<div class="rdr-overlay" id="rdr-overlay" onclick="closePanel()">
  <div class="rdr-panel" onclick="event.stopPropagation()">
    <div class="rdr-panel-hdr">
      <span class="rdr-panel-title" id="rdr-panel-title"></span>
      <button class="rdr-panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="rdr-panel-body" id="rdr-panel-body"></div>
  </div>
</div>

<div class="lib-toast" id="lib-toast"></div>

<script type="module" src="js/aqs-firebase.js"></script>
<script type="module" src="js/aqs-groq-key.js"></script>
<script type="module" src="js/aqs-library.js"></script>
<script type="module">
  let _book=null,_user=null,_pages=[],_cur=1,_total=1;
  let _pdfDoc=null;
  let _mcqData=[],_mcqScore=0,_mcqAnswered=0,_explainText='';

  const bookId=new URLSearchParams(location.search).get('id');
  if(!bookId) window.libToast('No book ID.');

  /* ── Auth ── */
  window.libOnAuth(async function(user){
    _user=user;
    if(bookId&&_book) window.libRecordView(bookId,user?user.uid:null);
    if(_user&&bookId){
      const liked=await window.libHasLiked(bookId,_user.uid);
      if(liked){document.getElementById('rdr-like-btn').classList.add('liked');document.getElementById('rdr-like-icon').textContent='❤️';}
    }
  });

  /* ── Init ── */
  async function init(){
    if(!bookId) return;
    try{
      _book=await window.libGetBook(bookId);
      if(!_book){showErr('Book not found.');return;}
      document.title=_book.title+' — xzily Library';
      document.getElementById('rdr-title').textContent=_book.title;
      document.getElementById('rdr-page-booklabel').textContent=_book.title;
      document.getElementById('rdr-like-count').textContent=_book.likes||0;
      const dlBtn=document.getElementById('rdr-dl');
      if(_book.fileUrl){dlBtn.href=_book.fileUrl;dlBtn.download=_book.title||'document';dlBtn.style.display='inline-flex';}
      if(_book.parsedUrl){
        await loadParsed(_book.parsedUrl);
      } else if(_book.fileUrl){
        await loadPdfFallback(_book.fileUrl);
      } else {
        showErr('No content available for this book.');
      }
    }catch(e){showErr('Load error: '+e.message);}
  }

  /* ── Load parsed JSON from Cloudinary ── */
  async function loadParsed(url){
    try{
      const res=await fetch(url);
      if(!res.ok) throw new Error('fetch failed');
      const data=await res.json();
      _pages=data.pages||[];
      _total=_pages.length;
      if(!_total) throw new Error('empty');
      showPage(1);
    }catch(e){
      if(_book.fileUrl) await loadPdfFallback(_book.fileUrl);
      else showErr('Could not load document content.');
    }
  }

  /* ── PDF.js fallback (for books without parsedUrl) ── */
  async function loadPdfFallback(url){
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    try{
      _pdfDoc=await pdfjsLib.getDocument({url,withCredentials:false}).promise;
      _total=_pdfDoc.numPages;
      _pages=[];
      showPage(1);
    }catch(e){
      showErr('Could not render this document.<br><a href="'+url+'" target="_blank" style="color:#a5b4fc">Open original file ↗</a>');
    }
  }

  /* ── Render a page ── */
  async function showPage(n){
    _cur=n;
    document.getElementById('rdr-stage').scrollTop=0;

    // Progress bar
    document.getElementById('rdr-prog').style.width=Math.round((_cur/_total)*100)+'%';

    // Counters
    document.getElementById('rdr-pg-num').textContent=_cur+' / '+_total;
    document.getElementById('rdr-page-badge').textContent='Page '+_cur+' of '+_total;
    document.getElementById('rdr-page-tag').style.display='flex';
    document.getElementById('rdr-loading').style.display='none';

    // Buttons
    document.getElementById('rdr-prev').disabled=_cur<=1;
    document.getElementById('rdr-next').disabled=_cur>=_total;

    if(_pages.length>0){
      // Parsed text mode
      document.getElementById('rdr-canvas-wrap').style.display='none';
      const el=document.getElementById('rdr-content');
      el.style.display='block';
      const pg=_pages[n-1];
      el.innerHTML=formatText(pg?pg.text||'':'');
    } else if(_pdfDoc){
      // Canvas mode
      document.getElementById('rdr-content').style.display='none';
      document.getElementById('rdr-canvas-wrap').style.display='flex';
      await renderCanvas(n);
    }
  }

  /* ── Text formatter ── */
  function formatText(raw){
    if(!raw||!raw.trim()) return '<p style="color:#475569;font-style:italic;text-align:center;padding:40px 0">No readable text on this page.</p>';
    const lines=raw.split('\n');
    const out=[];
    let inPara=false;
    for(let i=0;i<lines.length;i++){
      const line=lines[i];
      const trimmed=line.trim();
      if(!trimmed){
        if(inPara){out.push('</p>');inPara=false;}
        continue;
      }
      // Heading detection: short + ALL CAPS or starts a section
      const isAllCaps=trimmed===trimmed.toUpperCase()&&/[A-Z]/.test(trimmed);
      const isH1=isAllCaps&&trimmed.length<=80&&i<12;
      const isH2=isAllCaps&&trimmed.length<=80&&!isH1;
      if(isH1){
        if(inPara){out.push('</p>');inPara=false;}
        out.push('<h1>'+esc(trimmed)+'</h1>');
      } else if(isH2){
        if(inPara){out.push('</p>');inPara=false;}
        out.push('<h2>'+esc(trimmed)+'</h2>');
      } else {
        if(!inPara){out.push('<p>');inPara=true;}
        else out.push(' ');
        out.push(esc(trimmed));
      }
    }
    if(inPara) out.push('</p>');
    return out.join('');
  }
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  /* ── PDF canvas render ── */
  async function renderCanvas(n){
    const canvas=document.getElementById('rdr-canvas');
    const wrap=document.getElementById('rdr-canvas-wrap');
    canvas.style.display='none';
    const page=await _pdfDoc.getPage(n);
    const containerW=wrap.clientWidth||window.innerWidth-48;
    const unscaled=page.getViewport({scale:1});
    const scale=Math.min((containerW-32)/unscaled.width,2);
    const vp=page.getViewport({scale});
    canvas.width=vp.width;canvas.height=vp.height;
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    canvas.style.display='block';
  }

  /* ── Page nav ── */
  window.prevPage=function(){if(_cur>1)showPage(_cur-1);};
  window.nextPage=function(){if(_cur<_total)showPage(_cur+1);};

  /* ── Like ── */
  window.toggleLike=async function(){
    if(!_user){window.libToast('Sign in to like.');return;}
    const btn=document.getElementById('rdr-like-btn');btn.disabled=true;
    try{
      const liked=await window.libToggleLike(bookId,_user.uid);
      document.getElementById('rdr-like-icon').textContent=liked?'❤️':'🤍';
      btn.classList.toggle('liked',liked);
      const cur=parseInt(document.getElementById('rdr-like-count').textContent)||0;
      document.getElementById('rdr-like-count').textContent=cur+(liked?1:-1);
    }catch(e){window.libToast('Error: '+e.message);}
    btn.disabled=false;
  };

  /* ── Panel ── */
  window.openPanel=function(panel){
    const overlay=document.getElementById('rdr-overlay');
    const body=document.getElementById('rdr-panel-body');
    const title=document.getElementById('rdr-panel-title');
    overlay.classList.add('open');
    if(panel==='ai'){
      title.textContent='✨ AI Explain';
      body.innerHTML=`
        <div style="font-size:.8rem;color:#64748b;margin-bottom:14px;line-height:1.7">
          AI reads this document and breaks down the key concepts, ideas, and summary.
        </div>
        <button class="rdr-panel-btn" id="p-explain-btn" onclick="doExplain()">✨ Generate Explanation</button>
        <div class="rdr-ai-out" id="p-ai-out"></div>
        <div id="p-dl-wrap" style="display:none">
          <button class="rdr-panel-btn" onclick="downloadExplanation()" style="margin-top:2px;background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);color:#94a3b8">⬇ Download as Text</button>
        </div>`;
    } else if(panel==='mcq'){
      title.textContent='🎯 Practice Quiz';
      body.innerHTML=`
        <div style="font-size:.8rem;color:#64748b;margin-bottom:14px;line-height:1.7">
          Generate 10 multiple-choice questions based on this document.
        </div>
        <button class="rdr-panel-btn" id="p-mcq-btn" onclick="doMCQ()">🎯 Generate Questions</button>
        <div class="rdr-mcq-wrap" id="p-mcq-wrap">
          <div id="p-mcq-qs"></div>
          <div class="rdr-score" id="p-score">
            <div class="rdr-score-num" id="p-score-num">0/10</div>
            <div class="rdr-score-lbl">Practice complete!</div>
            <button class="rdr-panel-btn" style="margin-top:14px" onclick="resetMCQ()">↺ Try Again</button>
          </div>
        </div>`;
    } else if(panel==='comments'){
      title.textContent='💬 Feedback';
      body.innerHTML=(_user?`
        <div style="margin-bottom:14px">
          <textarea class="rdr-comment-input" id="p-cmnt-inp" placeholder="Share your thoughts or ask a question…" rows="3"></textarea>
          <button class="rdr-comment-submit" onclick="submitComment()">Post Feedback</button>
        </div>`:`<div style="font-size:.8rem;color:#64748b;margin-bottom:14px">Sign in to leave feedback.</div>`)+
        `<div id="p-cmnt-list"><div style="color:#64748b;font-size:.82rem;text-align:center;padding:24px">Loading…</div></div>`;
      loadComments();
    }
  };
  window.closePanel=function(){document.getElementById('rdr-overlay').classList.remove('open');};

  /* ── AI Explain ── */
  window.doExplain=async function(){
    if(!_book?.fileUrl){window.libToast('No file to analyse.');return;}
    const btn=document.getElementById('p-explain-btn');
    btn.disabled=true;btn.innerHTML='<span class="lib-spinner"></span> Reading document…';
    const out=document.getElementById('p-ai-out');
    out.style.display='none';
    document.getElementById('p-dl-wrap').style.display='none';
    try{
      const result=await window.libAiExplain(_book.fileUrl,_book.title);
      _explainText=result;
      out.innerHTML=result.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
      out.style.display='block';
      document.getElementById('p-dl-wrap').style.display='block';
    }catch(e){window.libToast('AI error: '+e.message);}
    btn.disabled=false;btn.innerHTML='↺ Regenerate Explanation';
  };
  window.downloadExplanation=function(){
    if(!_explainText) return;
    const blob=new Blob([_explainText],{type:'text/plain'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=(_book?.title||'explanation')+' — AI Explanation.txt';a.click();
  };

  /* ── MCQ ── */
  window.doMCQ=async function(){
    if(!_book?.fileUrl){window.libToast('No file to analyse.');return;}
    const btn=document.getElementById('p-mcq-btn');
    btn.disabled=true;btn.innerHTML='<span class="lib-spinner"></span> Generating questions…';
    const wrap=document.getElementById('p-mcq-wrap');wrap.style.display='none';
    try{
      _mcqData=await window.libAiMCQ(_book.fileUrl,_book.title);
      _mcqScore=0;_mcqAnswered=0;
      renderMCQ();wrap.style.display='block';
    }catch(e){window.libToast('AI error: '+e.message);}
    btn.disabled=false;btn.innerHTML='↺ Regenerate Questions';
  };
  function renderMCQ(){
    document.getElementById('p-mcq-qs').innerHTML=_mcqData.map((q,qi)=>
      `<div class="rdr-mcq-q" id="pmq-${qi}">
        <div class="rdr-mcq-qt">${qi+1}. ${q.q}</div>
        <div class="rdr-mcq-opts">
          ${q.opts.map((opt,oi)=>`<button class="rdr-mcq-opt" onclick="answerMCQ(${qi},${oi})" id="pmqo-${qi}-${oi}">${opt}</button>`).join('')}
        </div>
      </div>`
    ).join('');
    document.getElementById('p-score').style.display='none';
  }
  window.answerMCQ=function(qi,oi){
    const q=_mcqData[qi];const qEl=document.getElementById('pmq-'+qi);
    if(qEl.dataset.answered) return;
    qEl.dataset.answered='1';
    q.opts.forEach((_,i)=>{
      const b=document.getElementById('pmqo-'+qi+'-'+i);b.disabled=true;
      if(i===q.ans)b.classList.add('correct');
      else if(i===oi)b.classList.add('wrong');
    });
    if(oi===q.ans)_mcqScore++;
    _mcqAnswered++;
    if(_mcqAnswered>=_mcqData.length){
      setTimeout(()=>{
        document.getElementById('p-score-num').textContent=_mcqScore+'/'+_mcqData.length;
        document.getElementById('p-score').style.display='block';
      },600);
    }
  };
  window.resetMCQ=function(){_mcqScore=0;_mcqAnswered=0;renderMCQ();};

  /* ── Comments ── */
  async function loadComments(){
    try{
      const list=await window.libGetComments(bookId);
      const el=document.getElementById('p-cmnt-list');if(!el)return;
      if(!list.length){el.innerHTML='<div style="color:#64748b;font-size:.82rem;text-align:center;padding:20px">No feedback yet. Be the first!</div>';return;}
      el.innerHTML=list.map(c=>
        `<div class="rdr-ci">
          <div class="rdr-ci-author">${c.displayName||'Anonymous'}</div>
          <div class="rdr-ci-text">${c.text}</div>
          <div class="rdr-ci-time">${window.libFormatTime(c.createdAt)}</div>
        </div>`
      ).join('');
    }catch(e){}
  }
  window.submitComment=async function(){
    if(!_user){window.libToast('Sign in to comment.');return;}
    const input=document.getElementById('p-cmnt-inp');
    const text=input?.value.trim();if(!text)return;
    const name=_user.displayName||_user.email?.split('@')[0]||'Student';
    try{
      await window.libAddComment(bookId,_user.uid,name,text);
      input.value='';window.libToast('Feedback posted!');loadComments();
    }catch(e){window.libToast('Error: '+e.message);}
  };

  function showErr(msg){
    document.getElementById('rdr-loading').innerHTML=`<div style="color:#ef4444;font-size:.88rem;text-align:center;max-width:360px">⚠️ ${msg}</div>`;
  }

  document.addEventListener('aqs:firebase:ready',init);
  if(window._aqsFirebaseReady) init();
</script>
</body>
</html>
